<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filmweb Helper Settings</title>
  <link rel="stylesheet" href="../assets/styles/theme.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="pageTitle">Filmweb Helper Settings</h1>
    </header>

    <main>
      <section class="setting-group">
        <label class="switch-container">
          <input type="checkbox" id="hideRatings">
          <span class="label-text" id="hideRatingsLabel">Hide ratings for unwatched movies</span>
        </label>
      </section>

      <section class="actions">
        <button id="saveBtn" class="primary-btn">Save Settings</button>
        <span id="status" class="status-msg"></span>
      </section>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
